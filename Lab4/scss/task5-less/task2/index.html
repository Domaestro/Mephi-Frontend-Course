<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список из 100 чисел (Less)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <ul id="numbers"></ul>
    <script>
        const list = document.getElementById('numbers');
        for (let i = 1; i <= 100; i += 1) {
            const item = document.createElement('li');
            item.className = 'num-' + i;
            item.textContent = i;
            list.appendChild(item);
        }
    </script>
</body>
</html>
