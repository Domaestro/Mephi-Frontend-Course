<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HTML Basics, DOM API - Задание 2</title>
</head>
<body>
    <h1>Добро пожаловать!</h1>

    <p>
        <i>Приветствуем</i> <u>вас</u> <b>в нашем</b> <a href="#">магазине</a>!
    </p>

    <p>
        &lt;h1&gt;Теорема Пифагора&lt;/h1&gt;:
        <i>c</i><sup>2</sup> = <i>a</i><sup>2</sup> + <i>b</i><sup>2</sup>
    </p>

    <table border="1" cellspacing="0" cellpadding="8" width="740">
        <tr>
            <td colspan="2">Информация</td>
        </tr>
        <tr>
            <td>Старая цена: <s>1000 ₽</s></td>
            <td>Новая цена: 500 ₽</td>
        </tr>
    </table>

    <script>
        document.addEventListener('selectstart', function (event) {
            event.preventDefault();
        });

        document.addEventListener('copy', function (event) {
            event.preventDefault();
        });

        document.addEventListener('contextmenu', function (event) {
            event.preventDefault();
        });

        document.addEventListener('keydown', function (event) {
            var key = event.key.toLowerCase();
            if ((event.ctrlKey || event.metaKey) && (key === 'c' || key === 'a')) {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
