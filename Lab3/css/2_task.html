<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CSS - Задание 2</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-size: 48px;
        }

        .tablet,
        .mobile {
            display: none;
        }

        @media (max-width: 1023px) {
            .desktop {
                display: none;
            }

            .tablet {
                display: block;
            }
        }

        @media (max-width: 767px) {
            .tablet {
                display: none;
            }

            .mobile {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="desktop">Desktop</div>
    <div class="tablet">Tablet</div>
    <div class="mobile">Mobile</div>
</body>
</html>
