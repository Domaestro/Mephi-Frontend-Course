<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vue clicker (CDN)</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; max-width: 480px; margin: 0 auto; }
        button { padding: 10px 24px; font-size: 18px; cursor: pointer; }
        .count { font-size: 32px; font-weight: bold; color: #336; }
    </style>
</head>
<body>
    <h1>Кликер на Vue (CDN-сборка, подгружаем скрипт с unpkg)</h1>

    <div id="app">
        <p>Счётчик: <span class="count">{{ count }}</span></p>
        <button @click="count += 1">Нажми меня</button>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const count = ref(0);
                return { count };
            },
        }).mount('#app');
    </script>
</body>
</html>
